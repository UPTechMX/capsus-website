{{ if .Site.Params.preloader.enable }}
{{ "<!-- preloader start -->" | safeHTML }}
<div class="preloader">
  {{ $preloader := resources.Get .Site.Params.preloader.preloader }}
  <img src="{{ if $preloader }}{{ $preloader.RelPermalink }}{{ else }}{{ . | absURL }}{{ end }}" alt="preloader" style="height: 74px;">
  {{ end }}
</div>
{{ "<!-- preloader end -->" | safeHTML }}
{{ end }}
